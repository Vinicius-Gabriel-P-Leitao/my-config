- name: Setup Debian Server
  hosts: debian_server
  become: yes
  vars:
    ssh_email: "vinicius.gabriel.p.leitao@gmail.com"
    ssh_key_path: "~/.ssh/id_ed25519_server"

  tasks:
    - name: Upgrade do apt
      apt:
        update_cache: yes

    - name: Instala dependencias
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - debian-archive-keyring
        state: present

    # --- DOCKER SETUP ---
    - name: Docker configuração
      set_fact:
        docker_arch: "{{ 'amd64' if ansible_facts['architecture'] == 'x86_64' else 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'armhf' }}"

    - name: Salva chave do repo do docker
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Salva chave do repo do docker
      get_url:
        url: https://download.docker.com/linux/debian/gpg
        dest: /etc/apt/keyrings/docker.gpg
        mode: '0644'

    - name: Adiciona o repo do docker
      apt_repository:
        repo: "deb [arch={{ docker_arch }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian {{ ansible_facts['distribution_release'] }} stable"
        state: present
        filename: docker

    - name: Install Docker components
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    # --- EASY PANEL SETUP ---
    - name: Configura o Easy Panel
      docker_container:
        name: easypanel
        image: easypanel/easypanel:latest
        state: started
        restart_policy: always
        volumes:
          - /etc/easypanel:/etc/easypanel
          - /var/run/docker.sock:/var/run/docker.sock:ro
        command: setup

    # --- NGINX SETUP ---
    - name: Salva chave do repo do nginx
      get_url:
        url: https://nginx.org/keys/nginx_signing.key
        dest: /usr/share/keyrings/nginx-archive-keyring.gpg
        mode: '0644'

    - name: Adiciona o repo do nginx
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/nginx-archive-keyring.gpg] https://nginx.org/packages/debian {{ ansible_facts['distribution_release'] }} nginx"
        state: present
        filename: nginx

    - name: Instala o nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Inicia e habilita o nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Cria o diretorio de apps do nginx
      file:
        path: /etc/nginx/conf.d/apps
        state: directory
        mode: '0755'

    - name: Copia as configuracoes do nginx
      copy:
        src: "../nginx/conf.d/{{ item }}"
        dest: "/etc/nginx/conf.d/{{ item }}"
      loop:
        - 00-general.conf
        - siaap-server.conf
        - siaap-upstream.conf
      notify: Reload Nginx

    - name: Copia as configuracoes do nginx
      copy:
        src: "../nginx/conf.d/apps/siaap.conf"
        dest: "/etc/nginx/conf.d/apps/siaap.conf"
      notify: Reload Nginx

    # --- SSH KEY SETUP ---
    - name: Generate SSH key
      user:
        name: "{{ ansible_user }}"
        ssh_key_bits: 256
        ssh_key_type: ed25519
        ssh_key_file: "{{ ssh_key_path }}"
        ssh_key_comment: "{{ ssh_email }}"
        generate_ssh_key: yes

    - name: Exibe a chave publica
      command: "cat {{ ssh_key_path }}.pub"
      register: ssh_pub_key
      changed_when: false

    - name: Exibe a chave publica
      debug:
        msg: "Add this key to GitHub: {{ ssh_pub_key.stdout }}"

  handlers:
    - name: Reload Nginx
      service:
        name: nginx
        state: reloaded
