services:
  portainer_agent_docker:
    container_name: portainer-agent-docker
    image: portainer/agent:2.39.1
    restart: always
    ports:
      - "9001:9001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:z
      - /var/lib/docker/volumes:/var/lib/docker/volumes:z
      - /:/host
