general.import = ["C:/Users/vinicius/AppData/Roaming/alacritty/catppuccin-mocha.toml"]

[terminal]
size = 12.0

[terminal.shell]
program = "pwsh.exe"
args = ["-NoLogo", "-WorkingDirectory", "~"]

[selection]
save_to_clipboard = true

[keyboard]
bindings = [
  { key = "C", mods = "Control|Shift", action = "Copy" },
  { key = "V", mods = "Control|Shift", action = "Paste" }
]

[font]
normal = { family = "Cascadia Code", style = "Regular" }
bold = { family = "Cascadia Code", style = "Bold" }
italic = { family = "Cascadia Code", style = "Italic" }
